<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#30363d" opacity="0.6"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Accent glow -->
  <ellipse cx="600" cy="315" rx="400" ry="200" fill="#10b981" opacity="0.04"/>
  <!-- Icon box -->
  <rect x="80" y="80" width="90" height="90" rx="20" fill="#10b981"/>
  <text x="125" y="145" text-anchor="middle" font-size="52" font-family="monospace" fill="white">⌘</text>
  <!-- Title -->
  <text x="80" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="800" fill="#e6edf3">NetTools Pro</text>
  <!-- Accent line -->
  <rect x="80" y="268" width="320" height="5" rx="3" fill="url(#accent)"/>
  <!-- Subtitle -->
  <text x="80" y="330" font-family="system-ui,sans-serif" font-size="28" fill="#8b949e">Network Dashboard — รวมเครื่องมือ Network ในที่เดียว</text>
  <!-- Feature pills -->
  <rect x="80" y="380" width="130" height="40" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="145" y="406" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#8b949e">🌐 DNS Tools</text>
  <rect x="226" y="380" width="140" height="40" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="296" y="406" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#8b949e">📡 IP Lookup</text>
  <rect x="380" y="380" width="130" height="40" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="445" y="406" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#8b949e">⚡ Speed Test</text>
  <rect x="524" y="380" width="130" height="40" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="589" y="406" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#8b949e">🔐 SSL Check</text>
  <rect x="668" y="380" width="130" height="40" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="733" y="406" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#8b949e">🧮 Subnet Calc</text>
  <!-- Stats row -->
  <text x="80" y="490" font-family="monospace" font-size="22" font-weight="700" fill="#10b981">54</text>
  <text x="115" y="490" font-family="system-ui,sans-serif" font-size="18" fill="#58626d"> tools  •  </text>
  <text x="218" y="490" font-family="monospace" font-size="22" font-weight="700" fill="#10b981">12</text>
  <text x="253" y="490" font-family="system-ui,sans-serif" font-size="18" fill="#58626d"> categories  •  </text>
  <text x="430" y="490" font-family="system-ui,sans-serif" font-size="18" fill="#58626d">100% free, no login</text>
  <!-- URL -->
  <text x="80" y="560" font-family="monospace" font-size="20" fill="#10b981">tools-network.vercel.app</text>
  <!-- Right decorative -->
  <circle cx="1050" cy="315" r="180" fill="none" stroke="#10b981" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="315" r="130" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1"/>
  <circle cx="1050" cy="315" r="80" fill="none" stroke="#10b981" stroke-width="1" opacity="0.08"/>
  <text x="1050" y="340" text-anchor="middle" font-size="72" opacity="0.3">⌘</text>
</svg>
