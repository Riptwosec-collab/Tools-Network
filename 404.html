<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — NetTools Pro</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2310b981'/><text x='16' y='22' text-anchor='middle' font-size='18' font-family='monospace' fill='white'>⌘</text></svg>">
  <style>
    :root { --bg:#0e1117; --text:#e6edf3; --text2:#8b949e; --accent:#10b981; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family: system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; }
    .wrap { max-width:420px; }
    .code { font-size:80px; font-weight:900; color:var(--accent); font-family:monospace; line-height:1; margin-bottom:12px; }
    h1 { font-size:20px; margin-bottom:10px; }
    p { font-size:14px; color:var(--text2); line-height:1.6; margin-bottom:28px; }
    a { display:inline-block; padding:10px 24px; background:var(--accent); color:#fff; border-radius:8px; text-decoration:none; font-size:14px; font-weight:600; }
    a:hover { opacity:.88; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>ไม่พบหน้าที่ต้องการ</h1>
    <p>URL นี้ไม่มีอยู่ในระบบ หรืออาจถูกย้ายไปแล้ว<br>กลับไปหน้าหลักเพื่อเลือกเครื่องมือ</p>
    <a href="/">⌘ กลับหน้าหลัก</a>
  </div>
</body>
</html>
